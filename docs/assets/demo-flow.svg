<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">Codex SwiftUI Developer Kit demo flow</title>
  <desc id="desc">A three step flow from a developer prompt, to Codex skill selection, to an audit checklist result.</desc>
  <rect width="1120" height="420" rx="18" fill="#f6f8fa"/>
  <rect x="28" y="28" width="1064" height="364" rx="16" fill="#ffffff" stroke="#d0d7de"/>
  <text x="56" y="76" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#24292f">Demo: prompt -> skill -> result</text>
  <text x="56" y="110" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#57606a">The pack turns broad SwiftUI requests into repeatable specialist review output.</text>

  <rect x="56" y="150" width="300" height="170" rx="12" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="82" y="188" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#24292f">Before prompt</text>
  <text x="82" y="224" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#24292f">"Audit my iPad SwiftUI app.</text>
  <text x="82" y="248" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#24292f">Check architecture, persistence,</text>
  <text x="82" y="272" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#24292f">screenshots, and Liquid Glass."</text>

  <path d="M374 235 L424 235" stroke="#57606a" stroke-width="3" stroke-linecap="round"/>
  <path d="M414 224 L428 235 L414 246" fill="none" stroke="#57606a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="444" y="150" width="300" height="170" rx="12" fill="#ddf4ff" stroke="#54aeff"/>
  <text x="470" y="188" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#0969da">Codex chooses skill</text>
  <text x="470" y="224" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#24292f">swiftui-project-router</text>
  <text x="470" y="248" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#24292f">-> architecture auditor</text>
  <text x="470" y="272" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#24292f">-> Liquid Glass auditor</text>

  <path d="M762 235 L812 235" stroke="#57606a" stroke-width="3" stroke-linecap="round"/>
  <path d="M802 224 L816 235 L802 246" fill="none" stroke="#57606a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="832" y="150" width="232" height="170" rx="12" fill="#dafbe1" stroke="#4ac26b"/>
  <text x="858" y="188" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#1a7f37">Checklist result</text>
  <text x="858" y="224" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#24292f">- priority findings</text>
  <text x="858" y="248" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#24292f">- apply / avoid guidance</text>
  <text x="858" y="272" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#24292f">- verification steps</text>
  <text x="858" y="296" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#24292f">- follow-up fixes</text>
</svg>
