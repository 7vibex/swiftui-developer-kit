name: Validate Skill Pack

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate skills and scripts
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Ruby and schema dependencies
        uses: ruby/setup-ruby@e34163cd15f4bb403dcd72d98e295997e6a55798 # v1.238.0
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep

      - name: Validate skill pack
        run: ./scripts/validate-skills.sh

  structured-scanner:
    name: Build and test structured scanner
    if: github.event_name != 'schedule'
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Ruby and schema dependencies
        uses: ruby/setup-ruby@e34163cd15f4bb403dcd72d98e295997e6a55798 # v1.238.0
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Select Swift toolchain
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2.4.0
        with:
          swift-version: "6.3"

      - name: Build and test scanner package
        run: |
          swift --version
          swift build --package-path scanner --configuration release
          swift test --package-path scanner

      - name: Scan a fixture and validate JSON output
        run: |
          report_path="$(mktemp)"
          trap 'rm -f "$report_path"' EXIT
          swift run --package-path scanner swiftui-scanner --format json scanner/Fixtures/Positive.swift > "$report_path"
          bundle exec ruby scripts/validate-json-schema.rb schemas/scanner-output.schema.json "$report_path"
          bundle exec ruby -rjson -e 'report = JSON.parse(File.read(ARGV.fetch(0))); abort("fixture scan produced no findings") if report.fetch("findings").empty?' "$report_path"

  official-doc-links:
    name: Check official documentation redirects
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install link-check dependency
        run: sudo apt-get update && sudo apt-get install --yes ripgrep

      - name: Follow official OpenAI documentation links
        run: ./scripts/check-official-doc-links.sh
