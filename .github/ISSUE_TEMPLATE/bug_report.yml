name: Bug report
description: Report incorrect behavior in a skill, script, doc, or example.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include command output, file paths, or a small fictional reproduction. Do not include secrets, screenshots, logs with private data, or private source.
    validations:
      required: true
  - type: input
    id: validation
    attributes:
      label: Validation command
      description: Example: ./scripts/validate-skills.sh
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This issue does not include secrets, private app data, generated audit folders, screenshots, or logs with private data.
          required: true
